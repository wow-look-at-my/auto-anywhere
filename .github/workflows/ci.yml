name: CI

on:
  push:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1

  publish-ghcr:
    needs: test
    uses: wow-look-at-my/actions/.github/workflows/publish-ghcr.yml@master
